apiVersion: apps/v1
kind: Deployment
metadata:
  name: cofre-backend
  labels:
    app: cofre-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cofre-backend
  template:
    metadata:
      labels:
        app: cofre-backend
    spec:
      containers:
      - name: backend
        image: cofre-digital/backend:latest
        ports:
        - containerPort: 54321
        envFrom:
        - configMapRef:
            name: cofre-config
        - secretRef:
            name: cofre-secrets
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /metrics
            port: 54321
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cofre-backend-svc
spec:
  selector:
    app: cofre-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 54321
  type: LoadBalancer
