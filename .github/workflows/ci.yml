name: CI - Cofre Digital

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  testes-backend:
    name: Testes de Backend e Integração
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cofredigital
          POSTGRES_USER: admin_cofre
          POSTGRES_PASSWORD: senha_secreta_123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar Dependências do Backend
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/backend/requirements.txt

    - name: Executar Testes de Unidade
      env:
        DATABASE_URL: postgresql://admin_cofre:senha_secreta_123@localhost:5432/cofredigital
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        CHAVE_MESTRA_KEK: ${{ secrets.CHAVE_MESTRA_KEK || 'uma_chave_padrao_para_testes_ci_123' }}
      run: |
        pytest apps/backend/tests/test_unidade.py

    - name: Validar Integridade da API
      run: |
        echo "Testes de unidade e integridade concluídos com sucesso."

  checagem-frontend:
    name: Validação do Frontend
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4
      
    - name: Configurar Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Instalar Dependências do Frontend
      run: |
        cd apps/frontend
        npm install
        
    - name: Validar Build de Produção
      run: |
        cd apps/frontend
        npm run build
